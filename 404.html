<!DOCTYPE html>

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;

  font-size: 32px; font-weight: 800; letter-spacing: -0.02em;

  display: inline-block; padding: 14px 28px; border-radius: 100px;
